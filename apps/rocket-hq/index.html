<!DOCTYPE html>
<html lang="fr" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokeforge — Rocket HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0812; --panel:#14102a; --line:#4a3a8a;
      --accent:#ffcc5a; --danger:#ff4466; --ok:#70e0a4;
      --text:#e8deff; --muted:#7060a8; --rocket:#cc2233;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:Verdana,sans-serif;font-size:13px;}
    h2{font-family:'Press Start 2P',monospace;font-size:.65em;color:var(--accent);
       text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
    h3{font-size:.8em;color:#b9adff;margin:8px 0 4px;}
    h4{font-size:.75em;color:#9e91e0;margin:6px 0 4px;}

    /* ── LAYOUT ──────────────────────────────────── */
    .app{display:grid;gap:0;}
    .topbar{
      display:flex;justify-content:space-between;align-items:center;
      gap:10px;flex-wrap:wrap;padding:8px 12px;
      background:var(--panel);border-bottom:2px solid var(--line);
      position:sticky;top:0;z-index:20;
    }
    .topbar-logo{font-family:'Press Start 2P',monospace;font-size:.7em;color:var(--rocket);letter-spacing:.05em;}
    .chips{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:.8em;}
    .chip{padding:3px 8px;border:1px solid var(--line);border-radius:4px;font-size:.85em;}

    /* World Band */
    #worldBand{
      width:100%;height:160px;position:relative;overflow:hidden;
      background:linear-gradient(160deg,#1a0a2e 0%,#0d1a0d 60%,#0a0a1a 100%);
      border-bottom:2px solid var(--line);transition:background 1s ease;
    }
    .world-hq{position:absolute;left:12px;top:50%;transform:translateY(-50%);
      display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none;}
    .world-hq img{width:56px;image-rendering:pixelated;}
    .world-hq-label{font-family:'Press Start 2P',monospace;font-size:.35em;color:var(--accent);}
    .world-pokemon{position:absolute;bottom:14px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;
      animation:worldFloat 3s ease-in-out infinite;
      filter:drop-shadow(0 0 6px rgba(255,204,90,.35));}
    .world-pokemon:hover{filter:drop-shadow(0 0 14px rgba(255,204,90,.85));transform:scale(1.15);}
    .world-zone-label{position:absolute;top:8px;right:12px;font-family:'Press Start 2P',monospace;
      font-size:.35em;color:rgba(255,255,255,.35);}
    .world-stars{position:absolute;inset:0;pointer-events:none;
      background-image:
        radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.12) 0%,transparent 100%),
        radial-gradient(1px 1px at 35% 55%,rgba(255,255,255,.08) 0%,transparent 100%),
        radial-gradient(1px 1px at 65% 30%,rgba(255,255,255,.1)  0%,transparent 100%),
        radial-gradient(1px 1px at 82% 72%,rgba(255,255,255,.07) 0%,transparent 100%);}
    @keyframes worldFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes flashFade{0%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-65%) scale(1)}}

    /* Main grid */
    .main-layout{
      display:grid;
      grid-template-columns:260px 1fr 1fr 300px;
      gap:10px;padding:10px;align-items:start;
    }
    .col{display:grid;gap:10px;align-content:start;}
    .panel{background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:10px;}

    /* Cards */
    .card{border:1px solid #3a2e6a;background:#0f0c1e;padding:8px;border-radius:8px;font-size:.82em;}
    .card.pokemon{display:flex;gap:8px;align-items:center;}
    .poke-sprite{width:40px;height:40px;object-fit:contain;image-rendering:pixelated;background:#0a0812;border-radius:5px;}
    .card-list{display:grid;gap:6px;}
    .room{border:1px solid #3a2e6a;background:#0f0c1e;padding:8px;border-radius:8px;font-size:.82em;display:grid;gap:5px;}
    .mission-card{border:1px solid #3a2e6a;background:#0f0c1e;padding:8px;border-radius:8px;font-size:.78em;display:grid;gap:4px;}
    .badge-mission{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.75em;font-weight:700;background:var(--danger);color:#fff;margin-left:4px;}
    .badge-ok{background:var(--ok);color:#000;}

    /* Stat grid */
    .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
    .stat{padding:7px;border:1px solid #3a2e6a;border-radius:7px;background:#0f0c1e;font-size:.8em;}
    .rep-bar{height:6px;border-radius:3px;background:#2a2048;margin-top:3px;}
    .rep-fill{height:6px;border-radius:3px;background:var(--accent);transition:width .3s;}

    /* Inputs / buttons */
    button{border:2px solid #000;background:var(--accent);padding:5px 9px;
      border-radius:7px;font-weight:700;cursor:pointer;font-size:.78em;}
    button.danger{background:var(--danger);color:#fff;}
    button.ok{background:var(--ok);color:#000;}
    button.small{padding:3px 7px;font-size:.72em;}
    button:disabled{opacity:.4;cursor:not-allowed;}
    label{display:grid;gap:3px;font-size:.8em;color:var(--muted);}
    input,select{padding:6px 8px;border-radius:7px;border:1px solid var(--line);
      background:#0d0a1e;color:var(--text);font-size:.85em;}
    select[multiple]{height:auto;}
    .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .chat{display:grid;grid-template-columns:1fr auto;gap:6px;margin:6px 0;}

    /* Logs */
    .logs{display:grid;gap:3px;overflow-y:auto;}
    .logline{font-size:.72em;border-left:3px solid var(--line);padding:2px 6px;
      background:#0f0c1e;border-radius:0 5px 5px 0;line-height:1.5;}

    /* Recruit */
    .recruit-box{border:1px solid #3a2e6a;border-radius:8px;padding:8px;font-size:.8em;}
    .step-dot{display:inline-block;width:14px;height:14px;border-radius:50%;margin:0 2px;border:2px solid #3a2e6a;}
    .step-dot.done{background:var(--accent);border-color:var(--accent);}

    /* Profile */
    .profile{display:flex;gap:10px;align-items:center;}
    #playerSprite,.preview{width:64px;height:64px;border:2px solid var(--accent);
      border-radius:8px;background:#0a0812;object-fit:contain;image-rendering:pixelated;}

    /* Rooms band */
    #roomsBand{
      display:flex;gap:8px;flex-wrap:wrap;padding:8px 12px;
      border-top:2px solid var(--line);background:var(--panel);
      position:sticky;bottom:0;z-index:10;
    }
    .room-band-card{background:#0f0c1e;border:1px solid #3a2e6a;border-radius:8px;
      padding:6px 10px;min-width:100px;text-align:center;}
    .room-band-title{font-family:'Press Start 2P',monospace;font-size:.35em;
      color:var(--accent);margin-bottom:5px;white-space:nowrap;}
    .room-band-sprites{display:flex;gap:3px;justify-content:center;align-items:flex-end;min-height:36px;}
    @keyframes bandFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes simFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes simPop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
    @keyframes simShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

    /* Overlay / Modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);
      display:grid;place-items:center;padding:16px;z-index:40;}
    .modal{width:min(860px,98vw);background:var(--panel);
      border:2px solid var(--line);border-radius:12px;padding:18px;display:grid;gap:10px;}
    .hidden{display:none!important;}

    /* Pokédex grid */
    .pokedex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:5px;}
    .pdx-card{background:#0f0c1e;border:1px solid #3a2e6a;border-radius:7px;
      padding:5px;text-align:center;font-size:.65em;}

    @media(max-width:1280px){.main-layout{grid-template-columns:1fr 1fr;}}
    @media(max-width:700px) {.main-layout{grid-template-columns:1fr;}.split{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-logo">⚡ ROCKET HQ</span>
    <div class="chips">
      <span class="chip" id="turnChip">Tour <strong id="turnValue">1</strong></span>
      <span class="chip" id="llmBadge">LLM OFF</span>
    </div>
    <div class="row">
      <button id="nextTurnBtn">⏩ Valider le tour</button>
      <button onclick="window.location.href='menu.html'" style="background:transparent;border-color:var(--muted);color:var(--muted)">← Menu</button>
      <button id="openSettingsBtn">⚙</button>
    </div>
  </header>

  <!-- WORLD BAND -->
  <div id="worldBand">
    <div class="world-stars"></div>
    <div class="world-hq">
      <img src="https://play.pokemonshowdown.com/sprites/trainers/giovanni-gen2.png" alt="QG">
      <span class="world-hq-label">⚡ QG</span>
    </div>
    <div class="world-zone-label" id="worldZoneLabel">KANTO</div>
  </div>

  <!-- MAIN LAYOUT -->
  <main class="main-layout">

    <!-- COL 1 : Boss + Ressources + Salles -->
    <div class="col">
      <section class="panel">
        <h2 id="h2Boss">👤 Boss</h2>
        <div class="profile">
          <img id="playerSprite" alt="sprite">
          <div>
            <div id="playerName" style="font-weight:700;font-size:.9em">...</div>
            <small id="teamName" style="color:var(--accent)">...</small>
          </div>
        </div>
        <h3>Ressources</h3>
        <div id="resourcesGrid" class="stat-grid"></div>
      </section>

      <section class="panel">
        <h2 id="h2Rooms">🏢 Salles du QG</h2>
        <div id="roomsList"></div>
      </section>
    </div>

    <!-- COL 2 : Pokémon + Équipes -->
    <div class="col">
      <section class="panel">
        <h2>🎮 Pokémon</h2>
        <div class="split">
          <div>
            <h4>Possédés</h4>
            <div id="pokemonOwnedList" class="card-list"></div>
          </div>
          <div>
            <h4>Nouveaux ce tour</h4>
            <div id="pokemonNewList" class="card-list"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2 id="h2Team">🤝 Équipes</h2>
        <label>Agent <select id="agentSelect"></select></label>
        <label>Pokémon <small>(Ctrl+clic)</small>
          <select id="pokemonSelect" multiple size="5"></select>
        </label>
        <button id="assignTeamBtn">Assigner (max 3)</button>
        <div id="agentTeams" class="card-list" style="margin-top:8px"></div>
      </section>

      <section class="panel">
        <h2 id="h2Pokedex">📖 Pokédex</h2>
        <div id="pokedexPanel" class="pokedex-grid"></div>
        <h3 id="h3ComboDex">Combo Dex</h3>
        <div id="comboDexPanel" class="card-list"></div>
      </section>
    </div>

    <!-- COL 3 : Missions + Agents + Recrutement -->
    <div class="col">
      <section class="panel">
        <h2 id="h2Missions">📋 Missions</h2>
        <div id="missionsList"></div>
      </section>

      <section class="panel">
        <h2 id="h2Agents">🕵️ Agents</h2>
        <div id="agentsList" class="card-list"></div>
        <h3>Recrutement</h3>
        <div class="recruit-box">
          <div id="recruitCandidate"></div>
          <div id="recruitTranscript" class="logs" style="max-height:130px;margin:5px 0;"></div>
          <div class="chat">
            <input id="recruitMessage" type="text" placeholder="Argumente…">
            <button id="sendRecruitBtn">→</button>
          </div>
        </div>
      </section>
    </div>

    <!-- COL 4 : Ally Chat + Logs -->
    <div class="col">
      <section class="panel" id="allyChatPanel"></section>

      <section class="panel">
        <h2 id="h2Logs">📜 Logs</h2>
        <div id="logOutput" class="logs" style="max-height:480px;"></div>
      </section>
    </div>

  </main>

  <!-- ROOMS BAND -->
  <footer id="roomsBand"></footer>

</div><!-- /.app -->

<!-- OVERLAY : Intro / Profil -->
<div id="introOverlay" class="overlay">
  <div class="modal">
    <h2>🚀 ROCKET HQ — Profil</h2>
    <label>Nom de team   <input id="teamInput" type="text" value="Team Rocket"></label>
    <label>Prénom        <input id="firstNameInput" type="text" value="Ari"></label>
    <label>Nom           <input id="lastNameInput" type="text" value="Voss"></label>
    <label>Sprite
      <select id="spriteSelect"></select>
      <img id="spritePreview" class="preview" alt="preview" style="margin-top:4px;">
    </label>
    <button id="introStartBtn">🚀 Lancer</button>
  </div>
</div>

<!-- OVERLAY : Défi -->
<div id="challengeOverlay" class="overlay hidden">
  <div class="modal" style="max-width:400px;">
    <h2>⚔️ Duel</h2>
    <p id="challengeBody" style="font-size:.82em;margin:4px 0;"></p>
    <div class="row">
      <button id="challengeYesBtn" class="ok">Accepter</button>
      <button id="challengeNoBtn" class="danger">Refuser</button>
    </div>
  </div>
</div>

<!-- OVERLAY : Settings -->
<div id="settingsOverlay" class="overlay hidden">
  <div class="modal">
    <h2>⚙️ Paramètres</h2>
    <label><input id="llmEnabledToggle" type="checkbox"> Utiliser Ollama (LLM local)</label>
    <label>URL Ollama  <input id="baseUrlInput" type="text"></label>
    <label>Modèle      <input id="modelInput"   type="text"></label>
    <div class="row">
      <button id="testOllamaBtn">Test</button>
      <button id="saveBtn">💾 Save</button>
      <button id="loadBtn">📂 Load</button>
      <button id="resetBtn" class="danger">🔄 Reset</button>
    </div>
    <div class="row">
      <button id="exportSaveBtn">Export .txt</button>
      <button id="importSaveBtn">Import .txt</button>
      <button id="exportCodeBtn">Code</button>
      <button id="importCodeBtn">Import code</button>
      <button id="exportLogsBtn">Logs</button>
    </div>
    <input id="saveFileInput" class="hidden" type="file" accept=".txt,.json">
    <pre id="llmStatus" style="font-size:.7em;max-height:60px;overflow:auto;">—</pre>
    <button id="closeSettingsBtn" class="danger">✖ Fermer</button>
  </div>
</div>

<script src="./app_v4.js"></script>
</body>
</html>
