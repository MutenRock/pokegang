<style>
/* ── WORLD BAND ─────────────────────────────────────── */
#worldBand {
  position:relative; width:100%; height:160px;
  border:2px solid var(--line); border-radius:10px;
  overflow:hidden; transition:background 1s ease;
  background:linear-gradient(160deg,#1a0a2e 0%,#0d1a0d 60%,#0a0a1a 100%);
  margin-bottom:12px;
}
.world-hq {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  pointer-events:none;
}
.world-hq img { width:64px; image-rendering:pixelated; }
.world-hq-label {
  font-size:.4em; color:var(--accent);
  font-family:'Press Start 2P',monospace; text-align:center;
}
.world-pokemon {
  position:absolute; bottom:16px; cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  transition:transform .2s; animation:worldFloat 3s ease-in-out infinite;
  filter:drop-shadow(0 0 6px rgba(255,204,90,0.4));
}
.world-pokemon:hover { transform:scale(1.2); filter:drop-shadow(0 0 12px rgba(255,204,90,0.8)); }
@keyframes worldFloat {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}
}
@keyframes flashFade {
  0%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  80%{opacity:1} 100%{opacity:0;transform:translate(-50%,-60%) scale(1)}
}
.world-zone-label {
  position:absolute; top:8px; right:12px;
  font-size:.38em; color:rgba(255,255,255,0.4);
  font-family:'Press Start 2P',monospace;
}
.world-stars {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.1) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 70%, rgba(255,255,255,0.08) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 85%, rgba(255,255,255,0.1) 0%, transparent 100%);
}
</style>

<!-- Bande monde — à placer entre <header> et <main> -->
<div id="worldBand" class="panel" style="margin:0 0 0 0;border-radius:10px;">
  <div class="world-stars"></div>
  <div class="world-hq">
    <img src="https://play.pokemonshowdown.com/sprites/trainers/giovanni-gen2.png" alt="QG">
    <span class="world-hq-label">⚡ QG</span>
  </div>
  <div class="world-zone-label" id="worldZoneLabel">KANTO — ROUTE 1</div>
</div>
