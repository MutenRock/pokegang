<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokeforge :: Sim Lab</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar panel">
        <div class="brand-block">
          <h1>POKEFORGE</h1>
          <div class="subtitle" id="buildLabel">SIM LAB // V2</div>
        </div>
        <div class="topbar-stats">
          <div class="stat-chip"><span data-i18n="day">Day</span> <strong id="dayValue">1</strong></div>
          <div class="stat-chip"><span data-i18n="time">Time</span> <strong id="timeValue">Morning</strong></div>
          <div class="stat-chip"><span data-i18n="zone">Zone</span> <strong id="zoneValue">Workshop</strong></div>
          <div class="stat-chip"><span data-i18n="llm">LLM</span> <strong id="llmBadge">OFF</strong></div>
        </div>
        <div class="topbar-actions">
          <button class="pixel-btn alt" id="openSettingsBtn">ESC / MENU</button>
        </div>
      </header>

      <main class="game-layout">
        <section class="panel status-panel">
          <div class="panel-title"><span data-i18n="player">Player</span></div>
          <div class="portrait-box">
            <div class="pixel-avatar">@</div>
            <div>
              <div class="label" id="playerName">Ranger-01</div>
              <div class="muted" id="playerRole">Field Tamer</div>
            </div>
          </div>
          <div class="meter-group" id="meters"></div>
          <div class="inventory-block">
            <div class="small-title" data-i18n="inventory">Inventory</div>
            <div id="inventoryList" class="tag-wrap"></div>
          </div>
          <div class="companion-block">
            <div class="small-title" data-i18n="companions">Companions</div>
            <div id="companionList" class="entity-list compact"></div>
          </div>
        </section>

        <section class="panel map-panel">
          <div class="panel-title"><span data-i18n="regionMap">Region Map</span></div>
          <div class="map-shell">
            <div class="map-grid" id="mapGrid" aria-label="World map"></div>
          </div>
          <div class="zone-card">
            <div class="small-title" data-i18n="currentZone">Current zone</div>
            <h2 id="zoneName">Workshop</h2>
            <p id="zoneDescription" class="zone-description"></p>
            <div id="zoneTags" class="tag-wrap"></div>
          </div>
        </section>

        <section class="panel scene-panel">
          <div class="panel-title"><span data-i18n="scene">Scene</span></div>
          <div class="scene-output" id="sceneText"></div>
          <div class="action-grid" id="actions"></div>
        </section>

        <section class="panel world-panel">
          <div class="panel-title"><span data-i18n="locals">Locals</span></div>
          <div id="npcList" class="entity-list"></div>
          <div class="small-title" data-i18n="signals">Signals</div>
          <div id="creatureList" class="entity-list compact"></div>
        </section>

        <section class="panel log-panel">
          <div class="panel-title"><span data-i18n="eventLog">Event Log</span></div>
          <div id="logOutput" class="log-output"></div>
        </section>
      </main>
    </div>

    <div id="settingsOverlay" class="overlay hidden" aria-hidden="true">
      <div class="settings-window panel">
        <div class="settings-header">
          <div>
            <div class="subtitle">SYSTEM MENU</div>
            <h2 data-i18n="settings">Settings</h2>
          </div>
          <button class="pixel-btn danger" id="closeSettingsBtn">X</button>
        </div>

        <div class="settings-tabs">
          <button class="tab-btn active" data-tab="general" data-i18n="general">General</button>
          <button class="tab-btn" data-tab="display" data-i18n="display">Display</button>
          <button class="tab-btn" data-tab="llm" data-i18n="llmSetup">LLM Setup</button>
          <button class="tab-btn" data-tab="save" data-i18n="saveData">Save Data</button>
        </div>

        <div class="settings-body">
          <section class="tab-panel active" data-panel="general">
            <label class="field-row">
              <span data-i18n="language">Language</span>
              <select id="languageSelect">
                <option value="en-US">English</option>
                <option value="fr-FR">Français</option>
              </select>
            </label>

            <label class="field-row toggle-row">
              <span data-i18n="autoSave">Auto-save</span>
              <input type="checkbox" id="autosaveToggle" />
            </label>

            <label class="field-row toggle-row">
              <span data-i18n="llmEvents">Use LLM for dynamic events</span>
              <input type="checkbox" id="llmEnabledToggle" />
            </label>
          </section>

          <section class="tab-panel" data-panel="display">
            <label class="field-row">
              <span data-i18n="uiScale">UI scale</span>
              <input type="range" id="uiScaleRange" min="0.85" max="1.2" step="0.05" />
            </label>
            <div class="hint" id="uiScaleValue">1.00x</div>

            <label class="field-row toggle-row">
              <span data-i18n="scanlines">Scanlines</span>
              <input type="checkbox" id="scanlineToggle" />
            </label>

            <button class="pixel-btn" id="fullscreenBtn" data-i18n="fullscreen">Toggle fullscreen</button>
          </section>

          <section class="tab-panel" data-panel="llm">
            <label class="field-row">
              <span data-i18n="provider">Provider</span>
              <select id="providerSelect">
                <option value="disabled">Disabled</option>
                <option value="ollama">Ollama</option>
                <option value="openai">OpenAI-compatible</option>
              </select>
            </label>

            <label class="field-row">
              <span data-i18n="baseUrl">Base URL</span>
              <input type="text" id="baseUrlInput" placeholder="http://localhost:11434" />
            </label>

            <label class="field-row">
              <span data-i18n="model">Model</span>
              <input type="text" id="modelInput" placeholder="gemma3:4b" />
            </label>

            <label class="field-row">
              <span data-i18n="apiKey">API key</span>
              <input type="password" id="apiKeyInput" placeholder="optional" />
            </label>

            <label class="field-row">
              <span data-i18n="temperature">Temperature</span>
              <input type="range" id="temperatureRange" min="0" max="1.2" step="0.1" />
            </label>
            <div class="hint" id="temperatureValue">0.7</div>

            <label class="field-row">
              <span data-i18n="systemPrompt">System prompt</span>
              <textarea id="systemPromptInput" rows="4"></textarea>
            </label>

            <div class="inline-actions">
              <button class="pixel-btn" id="testOllamaBtn" data-i18n="testConnection">Test connection</button>
              <button class="pixel-btn alt" id="pullModelsBtn" data-i18n="listModels">List models</button>
            </div>
            <div class="llm-status" id="llmStatus"></div>
          </section>

          <section class="tab-panel" data-panel="save">
            <div class="inline-actions stretch">
              <button class="pixel-btn" id="saveBtn" data-i18n="saveGame">Save game</button>
              <button class="pixel-btn alt" id="loadBtn" data-i18n="loadGame">Load game</button>
              <button class="pixel-btn danger" id="resetBtn" data-i18n="resetGame">Reset run</button>
            </div>
            <p class="hint" data-i18n="saveHint">Saves are stored locally in your browser.</p>
          </section>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
