<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéForge — Gang Wars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #0a0a0a;
      --bg-card:     #141414;
      --bg-panel:    #1a1a1a;
      --bg-hover:    #222;
      --border:      #333;
      --border-light:#444;
      --text:        #e0e0e0;
      --text-dim:    #888;
      --red:         #cc3333;
      --red-dark:    #991f1f;
      --red-glow:    rgba(204, 51, 51, .35);
      --gold:        #ffcc5a;
      --gold-dim:    #b8943f;
      --green:       #44bb55;
      --blue:        #4488cc;
      --font-pixel:  'Press Start 2P', monospace;
      --font-body:   'Courier New', Consolas, monospace;
      --radius:      8px;
      --radius-sm:   4px;
    }

    html { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.5; }
    body { min-height: 100vh; }

    img { image-rendering: pixelated; }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ── Layout Shell ───────────────────────────────────────────── */
    #app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Top Bar ─────────────────────────────────────────────────── */
    #topBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 2px solid var(--border);
      gap: 12px;
    }

    #gangNameDisplay {
      font-family: var(--font-pixel);
      font-size: 13px;
      color: var(--red);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    #moneyDisplay {
      font-family: var(--font-pixel);
      font-size: 14px;
      color: var(--gold);
      text-align: center;
      flex-shrink: 0;
    }
    #moneyDisplay span { font-size: 16px; }

    #btnSettings {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      font-size: 20px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s, border-color .2s;
      flex-shrink: 0;
    }
    #btnSettings:hover { color: var(--text); border-color: var(--border-light); }

    /* ── Tab Navigation ──────────────────────────────────────────── */
    #tabNav {
      display: flex;
      gap: 2px;
      padding-top: 8px;
      border-bottom: 2px solid var(--red-dark);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-btn {
      font-family: var(--font-pixel);
      font-size: 10px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      color: var(--text-dim);
      white-space: nowrap;
      transition: background .2s, color .2s;
      position: relative;
      top: 2px;
    }
    .tab-btn:hover { background: var(--bg-hover); color: var(--text); }
    .tab-btn.active {
      background: var(--bg-panel);
      color: var(--gold);
      border-color: var(--red-dark);
      border-bottom: 2px solid var(--bg-panel);
    }

    /* ── Tab Content ─────────────────────────────────────────────── */
    #tabContent {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px;
      overflow-y: auto;
    }

    .tab-pane { display: none; animation: fadeIn .25s ease; }
    .tab-pane.active { display: block; }

    /* ── Gang Tab ─────────────────────────────────────────────────── */
    #bossProfile {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    #bossProfile .boss-sprite {
      width: 64px;
      height: 64px;
      border: 2px solid var(--red);
      border-radius: var(--radius-sm);
      background: var(--bg);
      flex-shrink: 0;
    }

    #bossProfile .boss-info { flex: 1; min-width: 0; }

    #bossProfile .boss-name {
      font-family: var(--font-pixel);
      font-size: 12px;
      color: var(--text);
      margin-bottom: 4px;
    }

    #bossProfile .boss-gang {
      font-size: 11px;
      color: var(--red);
      margin-bottom: 8px;
    }

    .reputation-bar {
      height: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .reputation-bar .rep-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red-dark), var(--red));
      border-radius: 5px;
      transition: width .4s ease;
    }

    #agentList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    #gangStats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-family: var(--font-pixel);
      font-size: 18px;
      color: var(--gold);
    }

    .stat-card .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ── Zones Tab ────────────────────────────────────────────────── */
    #zoneSelector {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      overflow-x: auto;
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .zone-btn {
      font-family: var(--font-pixel);
      font-size: 9px;
      padding: 8px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      white-space: nowrap;
      transition: all .2s;
    }
    .zone-btn:hover { border-color: var(--red); color: var(--text); }
    .zone-btn.active { border-color: var(--red); color: var(--gold); background: var(--bg-hover); }
    .zone-btn.locked { opacity: .4; cursor: not-allowed; }

    #zoneWindows {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .zone-window {
      width: 320px;
      height: 220px;
      position: relative;
      overflow: hidden;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background-color: var(--bg-card);
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
      transition: border-color .2s;
    }
    .zone-window:hover { border-color: var(--border-light); }

    .zone-spawn {
      position: absolute;
      cursor: pointer;
      animation: float 3s ease-in-out infinite;
      transition: transform .15s;
    }
    .zone-spawn:hover { transform: scale(1.15); }
    .zone-spawn.catching { pointer-events: none; animation: none; }

    /* ── Agent in zone ── */
    .zone-agent {
      position: absolute;
      bottom: 28px;
      left: 8px;
      z-index: 5;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      pointer-events: none;
    }
    .zone-agent img { width: 40px; height: 40px; image-rendering: pixelated; filter: drop-shadow(0 0 3px rgba(204,51,51,.5)); }
    .zone-agent .agent-label { font-family: var(--font-pixel); font-size: 7px; color: var(--gold); text-shadow: 0 0 4px #000; }

    /* ── Boss in zone ── */
    .zone-boss {
      position: absolute;
      bottom: 28px;
      right: 8px;
      z-index: 5;
      pointer-events: none;
    }
    .zone-boss img { width: 40px; height: 40px; image-rendering: pixelated; filter: drop-shadow(0 0 3px rgba(255,204,90,.5)); }

    /* ── Ball throw animation ── */
    .ball-projectile {
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 50;
      pointer-events: none;
      transition: none;
    }
    .ball-projectile img { width: 100%; height: 100%; }

    /* ── Capture burst effects ── */
    .capture-burst {
      position: absolute;
      pointer-events: none;
      z-index: 60;
    }
    .capture-burst .burst-ring {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 3px solid var(--green);
      animation: burstRing .6s ease-out forwards;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
    }
    .capture-burst.stars-3 .burst-ring { border-color: var(--blue); }
    .capture-burst.stars-4 .burst-ring { border-color: var(--gold); width: 70px; height: 70px; }
    .capture-burst.stars-5 .burst-ring { border-color: #ff44ff; width: 80px; height: 80px; box-shadow: 0 0 20px #ff44ff; }
    .capture-burst.shiny .burst-ring  { border-color: var(--gold); width: 90px; height: 90px; box-shadow: 0 0 30px var(--gold), 0 0 60px var(--gold-dim); }

    .capture-burst .burst-particle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      top: 50%; left: 50%;
      animation: burstParticle .7s ease-out forwards;
    }
    .capture-burst.stars-3 .burst-particle { background: var(--blue); }
    .capture-burst.stars-4 .burst-particle { background: var(--gold); width: 8px; height: 8px; }
    .capture-burst.stars-5 .burst-particle { background: #ff44ff; width: 10px; height: 10px; }
    .capture-burst.shiny .burst-particle  { background: var(--gold); width: 10px; height: 10px; }

    @keyframes burstRing {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
    }
    @keyframes burstParticle {
      0%   { transform: translate(-50%,-50%) translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(-50%,-50%) translate(var(--bx), var(--by)) scale(0); opacity: 0; }
    }

    /* ── Spawn timer panel ── */
    .zone-timers {
      position: absolute;
      top: 0; right: 0;
      z-index: 10;
      background: rgba(0,0,0,.8);
      border-bottom-left-radius: var(--radius);
      padding: 4px 6px;
      font-size: 9px;
      max-width: 140px;
      pointer-events: none;
    }
    .zone-timers .timer-row {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      padding: 1px 0;
      color: var(--text-dim);
    }
    .zone-timers .timer-row .timer-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .zone-timers .timer-row .timer-val { font-family: var(--font-pixel); font-size: 8px; color: var(--text); }
    .zone-timers .timer-row.event-now { animation: timerGlow 1s ease-in-out 3; }
    .zone-timers .timer-row .timer-chance { font-size: 7px; color: var(--gold-dim); }

    @keyframes timerGlow {
      0%, 100% { color: var(--text-dim); text-shadow: none; }
      50%      { color: var(--gold); text-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold-dim); }
    }

    /* ── Active boosts indicator ── */
    .zone-boosts {
      position: absolute;
      top: 0; left: 0;
      z-index: 10;
      display: flex;
      gap: 4px;
      padding: 3px 5px;
      pointer-events: none;
    }
    .zone-boosts .boost-badge {
      font-size: 14px;
      filter: drop-shadow(0 0 3px rgba(255,204,90,.6));
      animation: float 2s ease-in-out infinite;
    }

    /* ── Event banner ── */
    .zone-event-banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 8;
      font-family: var(--font-pixel);
      font-size: 10px;
      color: var(--gold);
      background: rgba(0,0,0,.85);
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--gold);
      animation: timerGlow 1.5s ease-in-out infinite;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 0 8px var(--gold);
    }

    /* ── Invest button ── */
    .zone-invest-btn {
      font-family: var(--font-pixel);
      font-size: 8px;
      padding: 3px 8px;
      background: var(--bg-hover);
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      color: var(--gold);
      cursor: pointer;
      transition: all .2s;
    }
    .zone-invest-btn:hover {
      background: var(--gold-dim);
      color: var(--bg);
      border-color: var(--gold);
    }

    .zone-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, .75);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
    }

    .zone-info .zone-name {
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--text);
    }

    .zone-info .zone-level {
      font-size: 10px;
      color: var(--gold);
    }

    /* ── Market Tab ───────────────────────────────────────────────── */
    #tabMarket .market-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      min-height: 400px;
    }

    @media (max-width: 700px) {
      #tabMarket .market-layout { grid-template-columns: 1fr; }
    }

    .market-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .market-panel h3 {
      font-family: var(--font-pixel);
      font-size: 11px;
      color: var(--red);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    #sellPanel .sell-list,
    #shopPanel .shop-list {
      flex: 1;
      overflow-y: auto;
    }

    /* ── PC Tab ───────────────────────────────────────────────────── */
    #tabPC .pc-layout {
      display: flex;
      gap: 16px;
      min-height: 400px;
    }

    #tabPC .pc-main { flex: 1; min-width: 0; }

    #filterBar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    #filterBar input,
    #filterBar select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 6px 10px;
      font-size: 12px;
    }
    #filterBar input:focus,
    #filterBar select:focus {
      outline: none;
      border-color: var(--red);
    }

    #pokemonGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 6px;
    }

    .pc-pokemon {
      width: 80px;
      height: 80px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      position: relative;
    }
    .pc-pokemon:hover { border-color: var(--gold-dim); transform: scale(1.08); }
    .pc-pokemon.selected { border-color: var(--gold); box-shadow: 0 0 8px var(--red-glow); }
    .pc-pokemon.shiny { animation: glow 2s ease-in-out infinite; }

    .pc-pokemon img { width: 64px; height: 64px; }

    #pokemonDetail {
      width: 280px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      flex-shrink: 0;
      overflow-y: auto;
      transition: transform .3s ease, opacity .3s ease;
    }
    #pokemonDetail.hidden { transform: translateX(20px); opacity: 0; pointer-events: none; }

    @media (max-width: 700px) {
      #tabPC .pc-layout { flex-direction: column; }
      #pokemonDetail { width: 100%; }
    }

    /* ── Pokédex Tab ──────────────────────────────────────────────── */
    #pokedexGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
      gap: 4px;
    }

    .dex-entry {
      width: 64px;
      height: 72px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--text-dim);
      transition: border-color .2s;
      cursor: pointer;
    }
    .dex-entry:hover { border-color: var(--border-light); }
    .dex-entry.caught { border-color: var(--green); }
    .dex-entry.caught .dex-number { color: var(--green); }
    .dex-entry.unseen { opacity: .35; }

    .dex-entry img { width: 40px; height: 40px; }
    .dex-entry .dex-number { font-family: var(--font-pixel); font-size: 7px; margin-top: 2px; }

    /* ── Combat Popup ────────────────────────────────────────────── */
    #combatPopup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, .85);
      align-items: center;
      justify-content: center;
      animation: fadeIn .2s ease;
    }
    #combatPopup.active { display: flex; }

    #combatPopup .combat-box {
      background: var(--bg-panel);
      border: 2px solid var(--red);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }

    #combatPopup .combat-title {
      font-family: var(--font-pixel);
      font-size: 14px;
      color: var(--red);
      text-align: center;
      margin-bottom: 16px;
    }

    #combatPopup .combat-arena {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      gap: 16px;
    }

    #combatPopup .combatant {
      text-align: center;
      flex: 1;
    }

    #combatPopup .combatant img {
      width: 96px;
      height: 96px;
    }

    #combatPopup .combatant.shake img { animation: shake .3s ease; }

    #combatPopup .combat-vs {
      font-family: var(--font-pixel);
      font-size: 20px;
      color: var(--gold);
      flex-shrink: 0;
    }

    .hp-bar {
      height: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .hp-bar .hp-fill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
      transition: width .3s ease;
    }
    .hp-bar .hp-fill.low { background: var(--gold); }
    .hp-bar .hp-fill.critical { background: var(--red); }

    #combatLog {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    #combatActions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    #combatActions button {
      font-family: var(--font-pixel);
      font-size: 9px;
      padding: 10px 18px;
      background: var(--red-dark);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      color: var(--text);
      transition: background .2s;
    }
    #combatActions button:hover { background: var(--red); }

    /* ── Notifications ───────────────────────────────────────────── */
    #notifications {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 2000;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      pointer-events: none;
      max-width: 340px;
    }

    .toast {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text);
      pointer-events: auto;
      animation: fadeIn .25s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .5);
    }
    .toast.success { border-left-color: var(--green); }
    .toast.gold { border-left-color: var(--gold); }
    .toast.leaving { animation: fadeOut .3s ease forwards; }

    /* ── Intro Overlay ───────────────────────────────────────────── */
    #introOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 3000;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #introOverlay.active { display: flex; }

    #introOverlay .intro-box {
      background: var(--bg-panel);
      border: 2px solid var(--red);
      border-radius: var(--radius);
      padding: 32px;
      width: 90%;
      max-width: 480px;
      text-align: center;
    }

    #introOverlay .intro-title {
      font-family: var(--font-pixel);
      font-size: 18px;
      color: var(--red);
      margin-bottom: 8px;
    }

    #introOverlay .intro-subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    #introOverlay .intro-field {
      margin-bottom: 16px;
      text-align: left;
    }

    #introOverlay .intro-field label {
      display: block;
      font-family: var(--font-pixel);
      font-size: 8px;
      color: var(--gold);
      margin-bottom: 6px;
    }

    #introOverlay .intro-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }
    #introOverlay .intro-field input:focus { outline: none; border-color: var(--red); }

    #introOverlay .sprite-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    #introOverlay .sprite-option {
      width: 64px;
      height: 64px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s;
    }
    #introOverlay .sprite-option:hover { border-color: var(--border-light); }
    #introOverlay .sprite-option.selected { border-color: var(--gold); box-shadow: 0 0 10px var(--red-glow); }
    #introOverlay .sprite-option img { width: 48px; height: 48px; }

    #introOverlay .btn-start {
      font-family: var(--font-pixel);
      font-size: 12px;
      padding: 14px 32px;
      background: var(--red);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      transition: background .2s;
    }
    #introOverlay .btn-start:hover { background: var(--red-dark); }

    /* ── Settings Modal ──────────────────────────────────────────── */
    #settingsModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2500;
      background: rgba(0, 0, 0, .8);
      align-items: center;
      justify-content: center;
      animation: fadeIn .2s ease;
    }
    #settingsModal.active { display: flex; }

    #settingsModal .settings-box {
      background: var(--bg-panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }

    #settingsModal .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    #settingsModal .settings-header h2 {
      font-family: var(--font-pixel);
      font-size: 13px;
      color: var(--text);
    }

    #settingsModal .btn-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 22px;
      line-height: 1;
      transition: color .2s;
    }
    #settingsModal .btn-close:hover { color: var(--text); }

    .settings-section {
      margin-bottom: 20px;
    }

    .settings-section h4 {
      font-family: var(--font-pixel);
      font-size: 9px;
      color: var(--gold);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      gap: 12px;
    }

    .settings-row label { font-size: 12px; color: var(--text-dim); }

    .settings-row select,
    .settings-row input[type="text"],
    .settings-row input[type="url"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 6px 10px;
      font-size: 12px;
      min-width: 160px;
    }
    .settings-row select:focus,
    .settings-row input:focus { outline: none; border-color: var(--red); }

    .settings-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .settings-actions button {
      font-family: var(--font-pixel);
      font-size: 8px;
      padding: 8px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      transition: border-color .2s, background .2s;
    }
    .settings-actions button:hover { border-color: var(--border-light); background: var(--bg-hover); }
    .settings-actions button.danger { border-color: var(--red-dark); color: var(--red); }
    .settings-actions button.danger:hover { background: var(--red-dark); color: #fff; }

    /* ── Keyframe Animations ─────────────────────────────────────── */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    @keyframes pop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 4px var(--gold-dim); }
      50%      { box-shadow: 0 0 14px var(--gold), 0 0 24px var(--gold-dim); }
    }

    /* ── Utility ─────────────────────────────────────────────────── */
    .hidden { display: none !important; }
    .pop { animation: pop .35s ease; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 520px) {
      #gangNameDisplay { font-size: 10px; max-width: 120px; }
      #moneyDisplay { font-size: 11px; }
      .tab-btn { font-size: 8px; padding: 8px 10px; }
      .zone-window { width: 100%; max-width: 320px; }
      #bossProfile { flex-direction: column; text-align: center; }
      #tabContent { padding: 10px; }
    }
  </style>
</head>
<body>

  <div id="app">

    <!-- ═══ Top Bar ═══ -->
    <header id="topBar">
      <div id="gangNameDisplay">Team ???</div>
      <div id="moneyDisplay"><span>₽</span> 0</div>
      <button id="btnSettings" aria-label="Settings">⚙</button>
    </header>

    <!-- ═══ Tab Navigation ═══ -->
    <nav id="tabNav">
      <button class="tab-btn active" data-tab="tabGang">💀 Gang</button>
      <button class="tab-btn" data-tab="tabZones">🗺️ Zones</button>
      <button class="tab-btn" data-tab="tabMarket">💰 Marché</button>
      <button class="tab-btn" data-tab="tabPC">💻 PC</button>
      <button class="tab-btn" data-tab="tabPokedex">📖 Pokédex</button>
    </nav>

    <!-- ═══ Tab Content ═══ -->
    <main id="tabContent">

      <!-- ── Gang ── -->
      <section id="tabGang" class="tab-pane active">

        <div id="bossProfile">
          <div class="boss-sprite"></div>
          <div class="boss-info">
            <div class="boss-name">Boss</div>
            <div class="boss-gang">Team ???</div>
            <div class="reputation-bar"><div class="rep-fill" style="width:0%"></div></div>
          </div>
        </div>

        <div id="agentList"></div>

        <div id="gangStats"></div>

      </section>

      <!-- ── Zones ── -->
      <section id="tabZones" class="tab-pane">
        <div id="zoneSelector"></div>
        <div id="zoneWindows"></div>
      </section>

      <!-- ── Market ── -->
      <section id="tabMarket" class="tab-pane">
        <div class="market-layout">
          <div id="sellPanel" class="market-panel">
            <h3>💰 Vendre</h3>
            <div class="sell-list"></div>
          </div>
          <div id="shopPanel" class="market-panel">
            <h3>🛒 Boutique</h3>
            <div class="shop-list"></div>
          </div>
        </div>
      </section>

      <!-- ── PC ── -->
      <section id="tabPC" class="tab-pane">
        <div class="pc-layout">
          <div class="pc-main">
            <div id="filterBar">
              <input type="text" id="pcSearch" placeholder="Rechercher...">
              <select id="pcSort">
                <option value="id">N° Pokédex</option>
                <option value="name">Nom</option>
                <option value="cp">PC ↓</option>
                <option value="recent">Récent</option>
              </select>
              <select id="pcFilter">
                <option value="all">Tous</option>
                <option value="shiny">Shiny ✨</option>
                <option value="fav">Favoris ★</option>
              </select>
            </div>
            <div id="pokemonGrid"></div>
          </div>
          <aside id="pokemonDetail" class="hidden"></aside>
        </div>
      </section>

      <!-- ── Pokédex ── -->
      <section id="tabPokedex" class="tab-pane">
        <div id="pokedexGrid"></div>
      </section>

    </main>

  </div>

  <!-- ═══ Combat Popup ═══ -->
  <div id="combatPopup">
    <div class="combat-box">
      <div class="combat-title">Combat</div>
      <div class="combat-arena">
        <div class="combatant" id="combatAlly">
          <img src="" alt="">
          <div class="hp-bar"><div class="hp-fill" style="width:100%"></div></div>
        </div>
        <div class="combat-vs">VS</div>
        <div class="combatant" id="combatEnemy">
          <img src="" alt="">
          <div class="hp-bar"><div class="hp-fill" style="width:100%"></div></div>
        </div>
      </div>
      <div id="combatLog"></div>
      <div id="combatActions"></div>
    </div>
  </div>

  <!-- ═══ Notifications ═══ -->
  <div id="notifications"></div>

  <!-- ═══ Intro Overlay ═══ -->
  <div id="introOverlay">
    <div class="intro-box">
      <div class="intro-title">PokéForge</div>
      <div class="intro-subtitle">Crée ton gang. Conquiers Kanto.</div>

      <div class="intro-field">
        <label>Nom du Boss</label>
        <input type="text" id="inputBossName" maxlength="16" placeholder="Red">
      </div>

      <div class="intro-field">
        <label>Nom du Gang</label>
        <input type="text" id="inputGangName" maxlength="20" placeholder="Team Fury">
      </div>

      <div class="intro-field">
        <label>Avatar</label>
      </div>
      <div class="sprite-picker" id="spritePicker"></div>

      <button class="btn-start" id="btnStartGame">Commencer</button>
    </div>
  </div>

  <!-- ═══ Settings Modal ═══ -->
  <div id="settingsModal">
    <div class="settings-box">
      <div class="settings-header">
        <h2>⚙ Paramètres</h2>
        <button class="btn-close" id="btnCloseSettings">&times;</button>
      </div>

      <div class="settings-section">
        <h4>Langue</h4>
        <div class="settings-row">
          <label>Langue du jeu</label>
          <select id="settingLang">
            <option value="fr" selected>Français</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <h4>IA / LLM</h4>
        <div class="settings-row">
          <label>Fournisseur</label>
          <select id="settingLLM">
            <option value="none">Aucun</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="local">Local (Ollama)</option>
          </select>
        </div>
        <div class="settings-row">
          <label>Clé API</label>
          <input type="text" id="settingAPIKey" placeholder="sk-...">
        </div>
      </div>

      <div class="settings-section">
        <h4>Sauvegarde</h4>
        <div class="settings-actions">
          <button id="btnExportSave">📤 Exporter</button>
          <button id="btnImportSave">📥 Importer</button>
        </div>
      </div>

      <div class="settings-section">
        <h4>Cache</h4>
        <div class="settings-actions">
          <button id="btnPurgeSprites" class="danger">🗑 Purger sprites</button>
          <button id="btnResetAll" class="danger">⚠ Reset complet</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
